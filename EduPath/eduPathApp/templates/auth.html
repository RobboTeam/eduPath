<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_name }}</title>
  <style>
    :root {
      --primary-color: #4a90e2;
      --primary-hover: #357abd;
      --error-color: #d9534f;
      --bg-color: #f4f7f6;
      --text-color: #333;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .form-container {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 { margin-top: 0; color: var(--primary-color); }

    form p {
      text-align: left;
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .errorlist {
      color: var(--error-color);
      list-style: none;
      padding: 0;
      margin: 0 0 10px 0;
      font-size: 0.8rem;
      text-align: left;
    }

    button {
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.98); }

    .btn-submit {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      margin-top: 10px;
    }

    .btn-submit:hover { background-color: var(--primary-hover); }

    .switch-section {
      margin-top: 2rem;
      font-size: 0.9rem;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
      padding: 8px 20px;
      margin-top: 8px;
    }

    .btn-outline:hover {
      background: rgba(74, 144, 226, 0.05);
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>{{ page_name }}</h2>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-submit">{{ btn_name }}</button>
    </form>
    <div class="switch-section">
      {% if is_login %}
        <p>Don't have an account?</p>
        <a href="/registration/">
          <button type="button" class="btn-outline">Sign Up</button>
        </a>
      {% else %}
        <p>Already have an account?</p>
        <a href="/login/">
          <button type="button" class="btn-outline">Login</button>
        </a>
      {% endif %}
    </div>
  </div>
</body>
</html>
